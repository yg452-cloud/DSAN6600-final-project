model_name: unet
input_channels: 6
num_classes: 1

data_root: data
train_split: train
val_split: val
test_split: test

image_size: 256
batch_size: 4
num_epochs: 10
learning_rate: 0.0001
weight_decay: 0.0001
patience: 5
threshold: 0.5
seed: 42

optimizer: adamw
loss_name: bce_dice

output_dir: outputs/unet
model_save_name: best_unet.pt